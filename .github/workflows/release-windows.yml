name: Windows release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: pip
          cache-dependency-path: requirements-release.txt

      - name: Install hash-locked release and test dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all: -r requirements-release.txt

      - name: Validate tag and public version metadata
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $versionInfo = Get-Content assets/version_info.txt -Raw -Encoding UTF8
          $bridgeVersionInfo = Get-Content assets/bridge_version_info.txt -Raw -Encoding UTF8
          $manifest = Get-Content browser_extension/manifest.json -Raw -Encoding UTF8 | ConvertFrom-Json
          if ($versionInfo -notmatch "ProductVersion', u'$([regex]::Escape($version))'") {
            throw "Tag does not match ProductVersion"
          }
          if ($manifest.version -ne $version) {
            throw "Tag does not match browser companion version"
          }
          if ($bridgeVersionInfo -notmatch "ProductVersion', u'$([regex]::Escape($version))'") {
            throw "Tag does not match browser bridge ProductVersion"
          }

      - name: Require tag to target the reviewed main commit
        shell: pwsh
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          $mainCommit = (git rev-parse origin/main).Trim()
          if ($LASTEXITCODE -ne 0 -or $mainCommit -ne $env:GITHUB_SHA) {
            throw "Release tag must point to the current reviewed main commit"
          }

      - name: Test and lint
        run: |
          python -m pytest -q
          python -m ruff check m3u8_core.py m3u8_desktop_app.py browser_companion.py browser_native_host.py tools/verify_release_package.py tests

      - name: Build, package, and privacy-scan
        shell: powershell
        run: .\build.ps1

      - name: Smoke-test packaged desktop executable
        shell: pwsh
        run: |
          $executable = Resolve-Path dist/UniversalVideoDownloader/UniversalVideoDownloader.exe
          $version = "${{ github.ref_name }}".TrimStart("v")
          $fileVersion = "$version.0"
          $process = Start-Process -FilePath $executable -PassThru -WindowStyle Hidden
          try {
            Start-Sleep -Seconds 5
            if ($process.HasExited) {
              throw "Packaged desktop application exited during smoke test: $($process.ExitCode)"
            }
          }
          finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id
            }
          }
          $app = Get-Item $executable
          $bridge = Get-Item dist/UniversalVideoDownloader/UniversalVideoDownloaderBridge.exe
          foreach ($binary in @($app, $bridge)) {
            if ($binary.VersionInfo.FileVersion -ne $fileVersion -or $binary.VersionInfo.ProductVersion -ne $version) {
              throw "Packaged version metadata is invalid: $($binary.Name)"
            }
          }

      - name: Stage verified release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: universal-video-downloader-release
          path: |
            dist/UniversalVideoDownloader-${{ github.ref_name }}-windows-x64.zip
            dist/SHA256SUMS-${{ github.ref_name }}.txt
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: windows-2022
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: RELEASE_NOTES.md
          sparse-checkout-cone-mode: false

      - name: Download verified release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: universal-video-downloader-release
          path: dist

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            dist/UniversalVideoDownloader-${{ github.ref_name }}-windows-x64.zip
            dist/SHA256SUMS-${{ github.ref_name }}.txt

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --verify-tag `
            --title "Universal Video Downloader ${{ github.ref_name }}" `
            --notes-file RELEASE_NOTES.md `
            "dist/UniversalVideoDownloader-${{ github.ref_name }}-windows-x64.zip#Windows x64 portable ZIP" `
            "dist/SHA256SUMS-${{ github.ref_name }}.txt#SHA-256 checksum"
