# VEMO server-side authority — the layer a client cannot bypass.
# Local hooks/pre-commit are fast feedback; THIS is the guarantee: it re-runs the same validator
# on the pushed/PR range, so `--no-verify` and a tampered client change nothing on a protected main.
#
# Install (consuming repo):  mkdir -p .github/workflows && cp enforcement/ci/vemo-ci.yml .github/workflows/
# Then require the "vemo" check in your branch protection rules — without that, CI is advisory.
name: vemo
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  vemo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Framework self-consistency (selfcheck — incl. ENFORCED-BY claims map to real mechanisms)
        run: python3 enforcement/validators/task_state.py selfcheck

      - name: Conformance eval (prove the gates fire, incl. hook end-to-end)
        run: python3 eval/run.py

      - name: Resolve change range (shared by backstop AND push gate — multi-task pushes gate every task in range)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" || true
            RANGE="origin/${{ github.base_ref }}...HEAD"
          else
            BEFORE="${{ github.event.before }}"
            case "$BEFORE" in ''|0000000000000000000000000000000000000000) BEFORE="HEAD~1";; esac
            RANGE="${BEFORE}...HEAD"
          fi
          echo "VEMO_DIFF_RANGE=$RANGE" >> "$GITHUB_ENV"

      - name: Governance backstop on the change range (scope / plan / tier integrity / required judge / secrets)
        run: bash enforcement/ci/pre-commit

      - name: Executed ground truth (paths.build / paths.smoke, when configured)
        run: python3 enforcement/validators/task_state.py verify-run

      - name: Push gate (acceptance-before-push + judge provenance + rule-of-two)
        run: bash enforcement/ci/pre-push < /dev/null
