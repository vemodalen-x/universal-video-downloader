# VEMO preset: Python. Applied by `vemo init --preset python` (copied to vemo.config.preset.yaml,
# which deep-merges over vemo.config.yaml). Only the stack-specific keys live here — everything else
# inherits the template defaults. Convention over configuration.
paths:
  build: "python -m compileall -q ."
  smoke: "pytest -q"
  test_entry: ["tests/"]
exclusions:
  third_party: [".venv/**", "**/__pycache__/**", "build/**", "dist/**", "*.egg-info/**"]
